<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Mágica</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Fredoka One para un look infantil -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fef9c3; /* Amarillo pastel suave */
            touch-action: manipulation;
        }
        .calc-button {
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }
        .calc-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }
        .display-screen {
            background-color: #ffffff;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            min-height: 100px;
        }
        /* Colores personalizados */
        .bg-kids-pink { background-color: #ffcfd2; }
        .bg-kids-blue { background-color: #b9fbc0; }
        .bg-kids-purple { background-color: #cfbaf0; }
        .bg-kids-orange { background-color: #fde4cf; }
        .bg-kids-cyan { background-color: #a3e4f7; }
        
        .border-kids-pink { border-color: #ff9aa2; }
        .text-kids-dark { color: #5a5a5a; }

        /* Estilo para simular PWA */
        @media (display-mode: standalone) {
            body { background-color: #fff; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-xs w-full bg-white rounded-[40px] p-6 shadow-2xl border-8 border-kids-pink relative overflow-hidden">
        <!-- Decoración de nubes/burbujas -->
        <div class="absolute -top-10 -right-10 w-24 h-24 bg-blue-100 rounded-full opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-pink-100 rounded-full opacity-50"></div>

        <!-- Título -->
        <h1 class="text-center text-2xl font-bold text-pink-500 mb-4 flex items-center justify-center gap-2">
            <span>✨</span> Calculadora <span>✨</span>
        </h1>

        <!-- Pantalla -->
        <div class="display-screen rounded-3xl p-4 mb-6 flex flex-col justify-end items-end overflow-hidden border-4 border-yellow-200">
            <div id="history" class="text-gray-400 text-sm h-6 overflow-hidden"></div>
            <div id="result" class="text-4xl font-bold text-kids-dark truncate w-full text-right">0</div>
        </div>

        <!-- Teclado -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Fila 1 -->
            <button onclick="clearScreen()" class="calc-button col-span-2 bg-red-200 hover:bg-red-300 text-red-600 font-bold p-4 rounded-2xl text-xl">Borrar</button>
            <button onclick="appendOperator('/')" class="calc-button bg-kids-purple text-purple-700 font-bold p-4 rounded-2xl text-2xl">÷</button>
            <button onclick="appendOperator('*')" class="calc-button bg-kids-purple text-purple-700 font-bold p-4 rounded-2xl text-2xl">×</button>

            <!-- Fila 2 -->
            <button onclick="appendNumber('7')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">7</button>
            <button onclick="appendNumber('8')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">8</button>
            <button onclick="appendNumber('9')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">9</button>
            <button onclick="appendOperator('-')" class="calc-button bg-kids-orange text-orange-700 font-bold p-4 rounded-2xl text-2xl">-</button>

            <!-- Fila 3 -->
            <button onclick="appendNumber('4')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">4</button>
            <button onclick="appendNumber('5')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">5</button>
            <button onclick="appendNumber('6')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">6</button>
            <button onclick="appendOperator('+')" class="calc-button bg-kids-orange text-orange-700 font-bold p-4 rounded-2xl text-2xl">+</button>

            <!-- Fila 4 -->
            <button onclick="appendNumber('1')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">1</button>
            <button onclick="appendNumber('2')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">2</button>
            <button onclick="appendNumber('3')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">3</button>
            <button onclick="calculate()" class="calc-button row-span-2 bg-kids-blue text-green-700 font-bold p-4 rounded-2xl text-3xl">=</button>

            <!-- Fila 5 -->
            <button onclick="appendNumber('0')" class="calc-button col-span-2 bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">0</button>
            <button onclick="appendNumber('.')" class="calc-button bg-kids-cyan text-blue-700 font-bold p-4 rounded-2xl text-2xl">.</button>
        </div>

        <p class="mt-6 text-center text-xs text-gray-400">¡Aprender matemáticas es divertido! 🎈</p>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;

        const resultDisplay = document.getElementById('result');
        const historyDisplay = document.getElementById('history');

        function updateDisplay() {
            resultDisplay.innerText = currentInput;
            if (operator && previousInput) {
                historyDisplay.innerText = `${previousInput} ${operator}`;
            } else {
                historyDisplay.innerText = '';
            }
        }

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                currentInput += number;
            }
            updateDisplay();
            playClickSound();
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
            playClickSound();
        }

        function clearScreen() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
            playClickSound(150);
        }

        function calculate() {
            if (operator === null || shouldResetScreen) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) {
                        result = "¡Ups! 😵";
                    } else {
                        result = prev / current;
                    }
                    break;
                default: return;
            }

            // Redondear para evitar decimales infinitos feos para niños
            if (typeof result === 'number') {
                result = Math.round(result * 1000) / 1000;
            }

            currentInput = result.toString();
            operator = null;
            previousInput = '';
            shouldResetScreen = true;
            updateDisplay();
            playWinSound();
        }

        // Efectos de sonido sintéticos simples usando Web Audio API
        function playClickSound(freq = 440) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(context.destination);
            
            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        function playWinSound() {
            playClickSound(523.25); // Do
            setTimeout(() => playClickSound(659.25), 100); // Mi
        }

        // Registro de Service Worker para PWA (Simulado)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                console.log('PWA Lista para ser instalada');
            });
        }
    </script>
</body>
</html>
